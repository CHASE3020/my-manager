<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyManager - Dashboard</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="index.html">
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        
       <header class="dashboard-header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>MyManager Dashboard</h1>
                    <p>Welcome back! Let's plan your day.</p>
                </div>
                
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
                    <a href="/" class="theme-btn" style="background-color: #d32f2f; text-decoration: none;">Logout</a>
                </div>
            </div>
        </header>

        <section class="card-section">
            <h2>Add New Activity</h2>
            <form action="/add-activity" method="POST" class="task-form">
                <div class="input-group">
                    <label for="task-name">Activity Name</label>
                    <input type="text" id="task-name" name="task-name" placeholder="e.g., Learn Docker" required>
                </div>
                <div class="input-group">
                    <label for="start-time">Start Time</label>
                    <input type="time" id="start-time" name="start-time" required>
                </div>
                <div class="input-group">
                    <label for="end-time">End Time</label>
                    <input type="time" id="end-time" name="end-time" required>
                </div>
                <button type="submit" class="submit-button add-btn">+ Add to Schedule</button>
            </form>
        </section>

        <section class="card-section">
            <h2>Your Schedule for Today</h2>
            <div class="schedule-list">
                
                {{if .}}
                    {{range .}}
                    <div class="activity-card">
                        <div class="activity-info">
                            <h2>{{.Name}}</h2>
                            <p>{{.StartTime}} - {{.EndTime}}</p>
                        </div>
                        <div class="timer-display">
                            <span class="countdown">--:--</span>
                            <p class="status">Waiting</p>
                        </div>
                    </div>
                    {{end}}
                {{else}}
                    <div class="empty-state">
                        <p>No activities scheduled yet. Add one above to get started!</p>
                    </div>
                {{end}}

            </div>
        </section>
    </div>

   <script>
        const themeBtn = document.getElementById('theme-toggle');
        const body = document.body;

        // 1. When the page loads, check if the user previously saved "dark" as their theme
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeBtn.textContent = '☀️ Light Mode';
        }

        // 2. When the button is clicked, toggle the theme and save the choice
        themeBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                themeBtn.textContent = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark'); // Save to browser memory
            } else {
                themeBtn.textContent = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light'); // Save to browser memory
            }
        });
    </script>
</body>
</html>
